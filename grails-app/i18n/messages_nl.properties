# Darwin core terms - record terms

# Additional termsdwc.coordinateUncertaintyInMeters.info = De horizontale afstand (in meters) van de gegeven decimale breedtegraad en lengtegraad die de kleinste cirkel beschrijft die de hele locatie bevat. Laat de waarde leeg als de onzekerheid onbekend is, niet kan worden ingeschat, of niet van toepassing is (omdat er geen coördinaten zijn). Nul is geen geldige waarde voor deze term.
dwc.license.info = Een juridisch document dat officiële toestemming geeft om iets te doen met de bron.
dwc.locality.info = De specifieke beschrijving van de plaats.
dwc.municipality.info = De volledige, niet afgekorte naam van de volgende kleinere bestuurlijke regio dan de provincie (stad, gemeente, enz.) waarin de locatie zich bevindt. Gebruik deze term niet voor een nabijgelegen benoemde plaats die niet de werkelijke locatie bevat.
dwc.occurrenceStatus.info = Een verklaring over de aanwezigheid of afwezigheid van een taxon op een locatie.
dwc.order.info = De volledige wetenschappelijke naam van de orde waarin het taxon is geclassificeerd.
dwc.associatedTaxa.info = Een lijst (samengevoegd en gescheiden) van identificatoren of namen van taxon-records en de associaties van deze waarneming met elk van hen.
dwc.informationWithheld.info = Aanvullende informatie die bestaat, maar niet is gedeeld in het gegeven record.
dwc.georeferenceVerificationStatus.info = Een categorische beschrijving van de mate waarin de georeferentie is geverifieerd om de best mogelijke ruimtelijke beschrijving voor de locatie van de waarneming weer te geven.
