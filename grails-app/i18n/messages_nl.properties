# Darwin Core term tooltips (Dutch)
dwc.dataProvider.info = Een persoon of organisatie verantwoordelijk voor het beschikbaar stellen van de gegevens; de entiteit die de dataset levert.
dwc.dataResource.info = De naam van de bron waar de gegevens vandaan komen (bijv. een dataset of datasetverzameling).
dwc.institutionCode.info = De naam (of acroniem) die wordt gebruikt door de instelling die de in het record genoemde objecten of informatie bewaart.
dwc.collectionCode.info = De naam, acroniem, coden of initialisme dat de collectie of dataset identificeert waar het record vandaan komt.
dwc.catalogNumber.info = Een identifier (bij voorkeur uniek) voor het record binnen de dataset of collectie.
dwc.otherCatalogNumbers.info = Een lijst (geconcateneerd en gescheiden) van eerdere of alternatieve volledig gekwalificeerde catalogusnummers of andere door mensen gebruikte identificatoren voor dezelfde gebeurtenis.
dwc.occurrenceID.info = Een identificator voor de waarneming (in tegenstelling tot een specifiek digitaal record van de waarneming). Bij afwezigheid van een persistent wereldwijd unieke identifier, maak er ��n van een combinatie van identifiers in het record.
dwc.basisOfRecord.info = De specifieke aard van het datadocument. Aanbevolen is het gebruik van een gecontroleerde vocabulaire.
dwc.preparations.info = Een lijst (geconcateneerd en gescheiden) van preparaten en conserveringsmethoden voor een MateriaalEntiteit.
dwc.identifiedBy.info = Een lijst (geconcateneerd en gescheiden) van namen van personen, groepen of organisaties die de taxon aan het object toegewezen hebben.
dwc.recordedBy.info = Een lijst (geconcateneerd en gescheiden) van namen van personen, groepen of organisaties die verantwoordelijk zijn voor het registreren van de oorspronkelijke waarneming. De primaire verzamelaar of waarnemer, vooral degene die een persoonlijke identificator (recordNumber) toepast, moet als eerste worden vermeld.
dwc.recordNumber.info = Een identificator gegeven aan de waarneming op het moment dat deze geregistreerd werd. Dient vaak als link tussen veldnotities en een waarnemingsrecord.
dwc.typeStatus.info = Een lijst (geconcateneerd en gescheiden) van nomenclaturale types die op het object zijn toegepast.
dwc.identificationQualifier.info = Een korte frase of standaardterm ("cf.", "aff.") om twijfel van de determinator over de identificatie uit te drukken.
dwc.reproductiveCondition.info = De reproductieve toestand van de biologische individuen die in de waarneming worden weergegeven.
dwc.sex.info = Het geslacht van de biologische individuen in de waarneming.
dwc.behavior.info = Het gedrag dat het onderwerp vertoonde op het moment van registratie van de waarneming.
dwc.individualCount.info = Het aantal individuen aanwezig op het moment van de waarneming.
dwc.lifeStage.info = De leeftijdsklasse of levensfase van het organisme op het moment van de waarneming.
dwc.rights.info = Informatie over rechten met betrekking tot de bron.
dwc.associatedOccurrences.info = Een lijst (geconcateneerd en gescheiden) van identificatoren van andere waarnemingsrecords en hun associaties met deze waarneming.
dwc.datasetName.info = De naam van de dataset waar het record vandaan komt.
dwc.eventID.info = Een identificator voor het evenement (iets dat plaatsvindt op een plaats en tijd).
dwc.parentEventID.info = Een identificator voor het bredere evenement dat dit event en mogelijk andere evenementen groepeert.
dwc.identificationRemarks.info = Commentaar of aantekeningen over de identificatie van het specimen.
dwc.eventDate.info = De datum (en optioneel tijd) van het evenement.
dwc.samplingProtocol.info = Een beschrijving van de methoden gebruikt bij het verzamelen van de gegevens; b.v. het steekproefprotocol.
dwc.higherClassification.info = Een lijst (geconcateneerd en gescheiden) van taxonomische rangen hoger dan soort, geformatteerd als een classificatiestring.
dwc.scientificName.info = De volledige wetenschappelijke naam, met auteursvermelding en datum indien bekend.
dwc.originalNameUsage.info = De oorspronkelijke naam (combinatie) zoals in de oorspronkelijke beschrijving of behandeling gebruikt.
dwc.taxonRank.info = De taxonomische rang (kingdom, phylum, class, order, family, genus, species, etc.) van de meest specifieke naam in het record.
dwc.kingdom.info = Het koninkrijk waartoe het taxon behoort.
dwc.phylum.info = De fyla/fylum waartoe het taxon behoort.
dwc.class.info = De klasse waarin het taxon is ingedeeld.
dwc.family.info = De familie waarin het taxon is ingedeeld.
dwc.genus.info = De geslachtsnaam waarin het taxon geplaatst is.
dwc.species.info = De soortnaam (epitheton) van het taxon.
dwc.habitat.info = Een categorie of omschrijving van de habitat waarin het evenement plaatsvond.
dwc.decimalLatitude.info = De geografische breedte (in decimale graden) van het evenement, negatief voor zuid.
dwc.decimalLongitude.info = De geografische lengte (in decimale graden) van het evenement, negatief voor west.
dwc.waterBody.info = De naam van het waterlichaam waarin het evenement plaatsvond (bv. meer, zee, oceaan).
dwc.minimumDepthInMeters.info = Minimale diepte van het evenement in meters.
dwc.maximumDepthInMeters.info = Maximale diepte van het evenement in meters.
dwc.minimumElevationInMeters.info = Minimale hoogte van het evenement in meters.
dwc.maximumElevationInMeters.info = Maximale hoogte van het evenement in meters.
dwc.island.info = De naam van het eiland (indien van toepassing) waar het evenement plaatsvond.
dwc.islandGroup.info = De eilandengroep waarin het eiland ligt waar het evenement plaatsvond.
dwc.locationRemarks.info = Aantekeningen of opmerkingen over de locatie waar het evenement plaatsvond.
dwc.fieldNotes.info = Veldnotities gerelateerd aan het evenement of waarneming.
dwc.country.info = De naam van het land of de belangrijkste bestuurlijke eenheid waarin de locatie zich bevindt.
dwc.stateProvince.info = De naam van de volgende kleinere bestuurlijke regio dan het land (staat, provincie, kanton, departement, regio, enz.) waarin de locatie zich bevindt.
dwc.locality.info = De specifieke beschrijving van de plaats.
dwc.geodeticDatum.info = De ellipsoïde, geodetische datum, of ruimtelijk referentiesysteem (SRS) waarop de geografische coördinaten in decimalLatitude en decimalLongitude gebaseerd zijn.
dwc.verbatimCoordinateSystem.info = Het coördinatenformaat voor de verbatimLatitude en verbatimLongitude of de verbatimCoordinates van de locatie.
dwc.verbatimLocality.info = De oorspronkelijke tekstuele beschrijving van de plaats.
dwc.coordinatePrecision.info = Een decimale representatie van de precisie van de coördinaten gegeven in decimalLatitude en decimalLongitude.
dwc.coordinateUncertaintyInMeters.info = De horizontale afstand (in meters) van de gegeven decimalLatitude en decimalLongitude die de kleinste cirkel beschrijft die de gehele locatie bevat. Laat de waarde leeg als de onzekerheid onbekend is, niet kan worden geschat, of niet van toepassing is (omdat er geen coördinaten zijn). Nul is geen geldige waarde voor deze term.
dwc.dataGeneralizations.info = Acties genomen om de gedeelde gegevens minder specifiek of volledig te maken dan in hun oorspronkelijke vorm. Suggereert dat alternatieve gegevens van hogere kwaliteit beschikbaar kunnen zijn op verzoek.
dwc.informationWithheld.info = Aanvullende informatie die bestaat, maar die niet is gedeeld in het gegeven record.
dwc.georeferenceVerificationStatus.info = Een categorische beschrijving van de mate waarin de georeference is geverifieerd om de best mogelijke ruimtelijke beschrijving van de locatie van de waarneming te vertegenwoordigen.
dwc.georeferenceSources.info = Een lijst (geconcateneerd en gescheiden) van kaarten, gazeteers of andere bronnen gebruikt om de locatie te georefereren, voldoende specifiek beschreven om iedereen in de toekomst toe te staan dezelfde bronnen te gebruiken.
dwc.georeferenceProtocol.info = Een beschrijving of verwijzing naar de methoden gebruikt om de ruimtelijke voetafdruk, coördinaten en onzekerheden te bepalen.
dwc.georeferencedBy.info = Een lijst (geconcateneerd en gescheiden) van namen van personen, groepen of organisaties die de georeference (ruimtelijke representatie) voor de locatie hebben bepaald.

